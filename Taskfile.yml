version: "3"

vars:
  TF_DIR: terraform
  TF: 'terraform -chdir={{.TF_DIR}}'
  PYTHON: .venv/bin/python3
  _REGION_FROM_TFVARS:
    sh: 'grep -m1 "^region" terraform/terraform.tfvars 2>/dev/null | awk -F"\"" "{print \$2}" || echo ""'
  REGION: '{{.REGION | default ._REGION_FROM_TFVARS | default "us-east-1"}}'
  ACCOUNT_ID:
    sh: 'aws sts get-caller-identity --query Account --output text 2>/dev/null || echo ""'
  STATE_BUCKET:
    sh: 'echo "{{.ACCOUNT_ID}}-tf-state-$(echo -n "{{.ACCOUNT_ID}}" | sha256sum | cut -c1-8)"'

tasks:

  default:
    silent: true
    cmds: [task --list]

  # ── Auth ───────────────────────────────────────────────────────────

  login:
    desc: Verify AWS credentials and print caller identity
    preconditions: &aws
      - sh: test -n "{{.ACCOUNT_ID}}"
        msg: "No AWS credentials found. Run 'aws configure' or export AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY."
    cmds:
      - aws sts get-caller-identity
      - 'echo "Region: {{.REGION}}"'

  # ── Entrypoint ─────────────────────────────────────────────────────

  up:
    desc: "Full deploy: preflight → bootstrap → apply → populate Kendra + Neptune"
    preconditions: *aws
    requires: { vars: [REPO_URI] }
    cmds:
      - task: preflight
      - |
        scripts/deploy.sh \
          --region   {{.REGION}}   \
          --repo-uri {{.REPO_URI}} \
          {{if eq .SKIP_PIPELINE "true"}}--skip-pipeline{{end}}

  down:
    desc: Alias for destroy
    cmds: ['task destroy']

  bootstrap:
    desc: Create S3 state bucket via terraform/bootstrap (idempotent)
    preconditions: *aws
    cmds:
      - '{{.TF}} -chdir={{.TF_DIR}}/bootstrap init -input=false'
      - '{{.TF}} -chdir={{.TF_DIR}}/bootstrap apply -auto-approve -var="region={{.REGION}}"'
      - 'echo "State bucket: $({{.TF}} -chdir={{.TF_DIR}}/bootstrap output -raw bucket_name)"'

  # ── Terraform ──────────────────────────────────────────────────────

  fmt:
    desc: Format Terraform files
    cmds: ['{{.TF}} fmt -recursive']

  fmt:check:
    desc: Check Terraform formatting (CI)
    cmds: ['{{.TF}} fmt -check -recursive']

  init:
    desc: Initialise Terraform with remote S3 backend
    preconditions: *aws
    cmds:
      - task: _tf-init
        vars: {INIT_FLAGS: "-reconfigure"}
    status: ['test -f {{.TF_DIR}}/.terraform.lock.hcl']

  init:upgrade:
    desc: Re-initialise Terraform and upgrade providers
    preconditions: *aws
    cmds:
      - task: _tf-init
        vars: {INIT_FLAGS: "-upgrade"}

  validate:
    desc: Run terraform validate
    deps: [init]
    cmds: ['{{.TF}} validate']

  plan:
    desc: Plan and save to tfplan
    deps: [init]
    cmds: ['{{.TF}} plan -input=false -out=tfplan']

  apply:
    desc: Plan then apply
    deps: [plan]
    prompt: "Apply changes to AWS account {{.ACCOUNT_ID}}?"
    cmds: ['{{.TF}} apply tfplan']

  destroy:
    desc: Destroy all infrastructure
    deps: [init]
    prompt: "Destroy ALL infrastructure in account {{.ACCOUNT_ID}}? Irreversible."
    silent: true
    cmds:
      - '{{.TF}} destroy -auto-approve -input=false'

  output:
    desc: Show Terraform outputs
    deps: [init]
    cmds: ['{{.TF}} output']

  oidc:import:
    desc: Import existing GitHub OIDC provider into Terraform state
    deps: [init]
    vars:
      OIDC_ARN:
        sh: 'aws iam list-open-id-connect-providers --query "OpenIDConnectProviderList[].Arn" --output text 2>/dev/null | tr "\t" "\n" | grep "token.actions.githubusercontent.com" || true'
    cmds:
      - |
        if [ -z "{{.OIDC_ARN}}" ]; then
          echo "OIDC: provider not found — will be created by terraform apply."; exit 0
        fi
        STATE_ADDR="module.hashicorp_docs_pipeline.aws_iam_openid_connect_provider.github[0]"
        if {{.TF}} state show "${STATE_ADDR}" &>/dev/null; then
          echo "OIDC: already in state — nothing to do."
        else
          echo "OIDC: importing {{.OIDC_ARN}}..."
          {{.TF}} import "${STATE_ADDR}" "{{.OIDC_ARN}}"
        fi

  # ── Docs pipeline (Kendra) ────────────────────────────────────────

  docs:run:
    desc: "Populate Kendra — ingest docs (TARGET: all|docs|registry|discuss|blogs)"
    deps: [init]
    silent: true
    preconditions: *aws
    env:
      KENDRA_INDEX_ID: '{{.KENDRA_INDEX_ID}}'
      KENDRA_DS_ID: '{{.KENDRA_DS_ID}}'
    cmds:
      - |
        eval "$(scripts/resolve_tf_outputs.sh {{.TF_DIR}})"
        TARGET="{{.TARGET | default "all"}}"
        REPO_URI=$(grep repo_uri {{.TF_DIR}}/terraform.tfvars 2>/dev/null | cut -d\" -f2 || echo "")
        case "$TARGET" in
          all|docs|registry|discuss|blogs) ;;
          *) echo "Error: TARGET must be one of: all, docs, registry, discuss, blogs"; exit 1 ;;
        esac
        scripts/run_pipeline.sh \
          --state-machine-arn     "$STATE_MACHINE_ARN" \
          --region                {{.REGION}} \
          --kendra-index-id       "$KENDRA_INDEX_ID" \
          --kendra-data-source-id "$KENDRA_DS_ID" \
          --bucket-name           "$RAG_BUCKET" \
          --repo-url              "$REPO_URI" \
          --target                "$TARGET" \
          --wait

  docs:test:
    desc: Validate Kendra retrieval with test queries
    deps: [init]
    preconditions: *aws
    env:
      KENDRA_INDEX_ID: '{{.KENDRA_INDEX_ID}}'
    cmds:
      - |
        eval "$(scripts/resolve_tf_outputs.sh {{.TF_DIR}})"
        [ -z "$KENDRA_INDEX_ID" ] && { echo "Error: KENDRA_INDEX_ID not found."; exit 1; }
        {{.PYTHON}} scripts/test_retrieval.py \
          --region {{.REGION}} \
          --kendra-index-id "$KENDRA_INDEX_ID" \
          --min-confidence "{{.MIN_CONFIDENCE | default "LOW"}}"

  docs:status:
    desc: Last 5 docs pipeline executions
    deps: [init]
    silent: true
    preconditions: *aws
    cmds:
      - task: _sfn:status
        vars: {TF_OUTPUT: state_machine_arn, LABEL: docs}

  bucket:report:
    desc: File counts per subfolder in RAG docs bucket
    preconditions: *aws
    silent: true
    deps: [init]
    vars:
      RAG_BUCKET: { sh: '{{.TF}} output -raw rag_bucket_name 2>/dev/null' }
    cmds:
      - |
        bucket="s3://{{.RAG_BUCKET}}"
        printf "Bucket: %s\n\n%-40s %s\n%s\n" "$bucket" "Folder" "Files" "$(printf '─%.0s' {1..49})"
        total=0
        for folder in $(aws s3 ls "$bucket/" --region {{.REGION}} | awk '{print $NF}'); do
          count=$(aws s3 ls --recursive "${bucket}/${folder}" --region {{.REGION}} 2>/dev/null | wc -l | tr -d ' ')
          printf "%-40s %6d\n" "$folder" "$count"
          total=$((total+count))
        done
        printf "\n%-40s %6d\n" "TOTAL" "$total"

  # ── Graph pipeline (Neptune) ───────────────────────────────────────

  graph:populate:
    desc: Trigger graph pipeline (terraform graph → Neptune) and wait
    preconditions: *aws
    deps: [init]
    env:
      GRAPH_REPO_URIS: '{{.GRAPH_REPO_URIS}}'
    cmds:
      - |
        eval "$(scripts/resolve_tf_outputs.sh {{.TF_DIR}})"
        [ -z "$GRAPH_STATE_MACHINE_ARN" ] && { echo "Error: graph_state_machine_arn not found. Ensure create_neptune=true and run 'task apply'."; exit 1; }
        REPO_URIS="${GRAPH_REPO_URIS:-$(grep graph_repo_uris {{.TF_DIR}}/terraform.tfvars 2>/dev/null | grep -oE '"[^"]+"' | tr -d '"' | tr '\n' ' ' || echo "")}"
        [ -z "$REPO_URIS" ] && { echo "Error: No repo URIs. Pass GRAPH_REPO_URIS or set graph_repo_uris in terraform.tfvars."; exit 1; }
        scripts/run_graph_pipeline.sh \
          --region               {{.REGION}} \
          --state-machine-arn    "$GRAPH_STATE_MACHINE_ARN" \
          --neptune-endpoint     "$NEPTUNE_ENDPOINT" \
          --neptune-port         "$NEPTUNE_PORT" \
          --graph-staging-bucket "$GRAPH_STAGING_BUCKET" \
          --repo-uris            "$REPO_URIS"

  graph:test:
    desc: Smoke-test Neptune graph (node/edge counts)
    preconditions: *aws
    deps: [init]
    cmds:
      - |
        eval "$(scripts/resolve_tf_outputs.sh {{.TF_DIR}})"
        [ -z "$NEPTUNE_PROXY_URL" ] && { echo "Error: neptune_proxy_url not found. Ensure neptune_create_proxy=true and run 'task apply'."; exit 1; }
        scripts/test_graph.sh --proxy-url "$NEPTUNE_PROXY_URL"

  graph:status:
    desc: Last 5 graph pipeline executions
    deps: [init]
    silent: true
    preconditions: *aws
    cmds:
      - task: _sfn:status
        vars: {TF_OUTPUT: graph_state_machine_arn, LABEL: graph}

  # ── Test ───────────────────────────────────────────────────────────

  test:
    desc: Python unit tests (pytest)
    cmds:
      - |
        [[ -d codebuild/scripts/tests ]] || { echo "No tests yet."; exit 0; }
        PY="{{.PYTHON}}"; [[ -x "$PY" ]] || PY="$(command -v python3)"
        "$PY" -m pytest codebuild/scripts/tests -v

  test:token-efficiency:
    desc: "Compare retrieval token cost (MODE: kendra|graph|combined|all)"
    silent: true
    deps: [init]
    preconditions: *aws
    env:
      KENDRA_INDEX_ID: '{{.KENDRA_INDEX_ID}}'
    cmds:
      - |
        set -euo pipefail
        eval "$(scripts/resolve_tf_outputs.sh {{.TF_DIR}})"
        MODE="{{.MODE | default "all"}}"
        case "$MODE" in kendra|graph|combined|all) ;; *) echo "Error: MODE must be kendra|graph|combined|all"; exit 1;; esac

        ARGS="--region {{.REGION}} --mode $MODE"
        [[ ! "$MODE" =~ ^(kendra|combined|all)$ ]] || {
          [[ -n "${KENDRA_INDEX_ID:-}" ]] || { echo "Error: KENDRA_INDEX_ID required for mode '$MODE'."; exit 1; }
          ARGS+=" --kendra-index-id $KENDRA_INDEX_ID"
        }
        [[ ! "$MODE" =~ ^(graph|combined|all)$ ]] || {
          [[ -n "${NEPTUNE_ENDPOINT:-}" || -n "${NEPTUNE_PROXY_URL:-}" ]] || { echo "Error: NEPTUNE_ENDPOINT or NEPTUNE_PROXY_URL required for mode '$MODE'. Deploy Neptune or use MODE=kendra."; exit 1; }
          [[ -z "${NEPTUNE_ENDPOINT:-}" ]] || ARGS+=" --neptune-endpoint $NEPTUNE_ENDPOINT --neptune-port $NEPTUNE_PORT"
          [[ -z "${NEPTUNE_PROXY_URL:-}" ]] || ARGS+=" --neptune-proxy-url $NEPTUNE_PROXY_URL"
        }
        [[ "{{.VERBOSE | default ""}}" != "true" ]] || ARGS+=" --verbose"
        {{.PYTHON}} scripts/test_token_efficiency.py $ARGS

  # ── Preflight ──────────────────────────────────────────────────────

  preflight:
    desc: All preflight checks (tools, auth, packages, files, Terraform)
    cmds: ['scripts/preflight.sh {{.REGION}} {{.PYTHON}} {{.TF_DIR}}']

  # ── Claude Code ────────────────────────────────────────────────────

  claude:setup:
    desc: Configure Claude Code for Amazon Bedrock
    preconditions: *aws
    vars:
      CLAUDE_REGION: '{{.CLAUDE_REGION | default "us-east-1"}}'
      CLAUDE_MODEL: '{{.CLAUDE_MODEL | default "claude-sonnet-4-20250514"}}'
    cmds:
      - |
        source scripts/setup_claude_bedrock.sh \
          --region {{.CLAUDE_REGION}} --model {{.CLAUDE_MODEL}} \
          {{if eq .PERSIST "true"}}--persist{{end}}

  # ── MCP ────────────────────────────────────────────────────────────

  mcp:install:
    desc: Install MCP server dependencies
    cmds: ['{{.PYTHON}} -m pip install -r mcp/requirements.txt --quiet && echo "MCP dependencies installed."']

  mcp:setup:
    desc: Register MCP server with Claude Code
    preconditions: *aws
    deps: [init]
    env:
      KENDRA_INDEX_ID: '{{.KENDRA_INDEX_ID}}'
    cmds:
      - |
        eval "$(scripts/resolve_tf_outputs.sh {{.TF_DIR}})"
        [ -z "$KENDRA_INDEX_ID" ] && { echo "Error: KENDRA_INDEX_ID not found."; exit 1; }
        ARGS="--region {{.REGION}} --kendra-index-id $KENDRA_INDEX_ID"
        [ -n "$NEPTUNE_ENDPOINT" ] && ARGS="$ARGS --neptune-endpoint $NEPTUNE_ENDPOINT --neptune-port $NEPTUNE_PORT"
        scripts/setup_mcp.sh $ARGS

  mcp:test:
    desc: Smoke-test MCP server tools
    preconditions: *aws
    deps: [init]
    env:
      KENDRA_INDEX_ID: '{{.KENDRA_INDEX_ID}}'
    cmds:
      - |
        eval "$(scripts/resolve_tf_outputs.sh {{.TF_DIR}})"
        [ -z "$KENDRA_INDEX_ID" ] && { echo "Error: KENDRA_INDEX_ID not found."; exit 1; }
        export AWS_REGION="{{.REGION}}" AWS_KENDRA_INDEX_ID="$KENDRA_INDEX_ID"
        export NEPTUNE_ENDPOINT NEPTUNE_PORT NEPTUNE_IAM_AUTH=true
        {{.PYTHON}} mcp/test_server.py

  # ── CI ─────────────────────────────────────────────────────────────

  shellcheck:
    desc: Lint shell scripts
    cmds:
      - |
        files=$(git ls-files 'scripts/*.sh' 'codebuild/scripts/*.sh' 2>/dev/null)
        : "${files:=$(ls scripts/*.sh codebuild/scripts/*.sh 2>/dev/null)}"
        [[ -n "$files" ]] && shellcheck $files || echo "No shell scripts found."

  ci:
    desc: All CI checks
    deps: [fmt:check, validate, shellcheck, test]

  # ── Internal helpers ───────────────────────────────────────────────

  _tf-init:
    internal: true
    env: {AWS_DEFAULT_REGION: '{{.REGION}}'}
    cmds:
      - |
        BUCKET_REGION=$(aws s3api get-bucket-location --bucket {{.STATE_BUCKET}} --query LocationConstraint --output text 2>/dev/null || echo "{{.REGION}}")
        [ "$BUCKET_REGION" = "None" ] || [ -z "$BUCKET_REGION" ] && BUCKET_REGION="us-east-1"
        {{.TF}} init \
          -backend-config="bucket={{.STATE_BUCKET}}" \
          -backend-config="region=$BUCKET_REGION" \
          -input=false {{.INIT_FLAGS}}

  _sfn:status:
    internal: true
    cmds:
      - |
        ARN=$({{.TF}} output -raw {{.TF_OUTPUT}} 2>/dev/null || echo "")
        if [ -z "${ARN}" ]; then
          echo "No {{.LABEL}} state machine found — has 'task apply' been run?"; exit 0
        fi
        aws stepfunctions list-executions \
          --state-machine-arn "${ARN}" --region "{{.REGION}}" --max-results 5 \
          --query "executions[].{Status:status, Started:startDate, Name:name}" \
          --output table
