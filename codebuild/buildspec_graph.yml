version: 0.2

# Graph pipeline buildspec — for each Terraform workspace:
#   1. Clone the workspace repo
#   2. Copy .tf files to a temp dir, strip any remote backend blocks
#   3. terraform init (local state — avoids needing remote backend credentials)
#   4. terraform graph -> DOT output
#   5. ingest_graph.py — parse DOT and load nodes/edges into Neptune via openCypher
#
# Required environment variables (set by Step Functions / CodeBuild project):
#   REPO_URI              — GitHub HTTPS URL of the Terraform workspace repo
#   GRAPH_STAGING_BUCKET  — S3 bucket for DOT snapshot upload
#   NEPTUNE_ENDPOINT      — Neptune cluster writer endpoint
#   NEPTUNE_PORT          — Neptune port (8182)
#   NEPTUNE_IAM_AUTH      — "true" to sign requests with IAM SigV4
#   AWS_REGION            — AWS region

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - yum install -y unzip jq
      - |
        # Install Terraform
        TF_VERSION="1.10.5"
        curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o terraform.zip
        unzip -q terraform.zip -d /usr/local/bin/
        rm terraform.zip
        terraform version
      - pip install -r codebuild/scripts/requirements_graph.txt

  pre_build:
    commands:
      - |
        echo "Cloning workspace repo ${REPO_URI}..."
        git clone --depth 1 "${REPO_URI}" workspace

        # Detect Terraform root: prefer terraform/ subdir, else repo root
        if ls workspace/terraform/*.tf 2>/dev/null | head -1 | grep -q .; then
          SRC_TF_DIR="${CODEBUILD_SRC_DIR}/workspace/terraform"
        else
          SRC_TF_DIR="${CODEBUILD_SRC_DIR}/workspace"
        fi

        # Copy .tf files to a temp dir and strip any remote backend blocks.
        # terraform graph requires a fully-initialized backend; stripping it
        # lets Terraform use an implicit local backend without state access.
        GRAPH_TF_DIR=$(mktemp -d)
        find "${SRC_TF_DIR}" -maxdepth 1 -name '*.tf' -exec cp {} "${GRAPH_TF_DIR}/" \;
        python3 - "${GRAPH_TF_DIR}" << 'PY'
        import sys, re, os
        for fname in sorted(os.listdir(sys.argv[1])):
            if not fname.endswith('.tf'):
                continue
            path = os.path.join(sys.argv[1], fname)
            with open(path) as f:
                content = f.read()
            # Strip backend blocks (single-level braces only — sufficient for S3/remote backends)
            cleaned = re.sub(r'\n?\s*backend\s+"[^"]+"\s*\{[^{}]*\}', '', content)
            with open(path, 'w') as f:
                f.write(cleaned)
        PY

        echo "GRAPH_TF_DIR=${GRAPH_TF_DIR}" > /tmp/build_env
        echo "REPO_NAME=$(basename ${REPO_URI} .git)" >> /tmp/build_env
        echo "Using Terraform root copy: ${GRAPH_TF_DIR}"

        cd "${GRAPH_TF_DIR}"
        terraform init -input=false -no-color 2>&1

  build:
    commands:
      - |
        source /tmp/build_env
        SNAPSHOT_KEY="snapshots/${REPO_NAME}/$(date -u +%Y%m%dT%H%M%SZ).dot"

        echo "Extracting dependency graph from ${GRAPH_TF_DIR}..."
        cd "${GRAPH_TF_DIR}"
        terraform graph > /tmp/graph.dot
        echo "DOT graph written ($(wc -l < /tmp/graph.dot) lines)"

        echo "Ingesting graph into Neptune (${NEPTUNE_ENDPOINT}:${NEPTUNE_PORT})..."
        python3 "${CODEBUILD_SRC_DIR}/codebuild/scripts/ingest_graph.py" \
          --dot-path     /tmp/graph.dot \
          --repo-uri     "${REPO_URI}" \
          --endpoint     "${NEPTUNE_ENDPOINT}" \
          --port         "${NEPTUNE_PORT}" \
          --region       "${AWS_REGION}" \
          --iam-auth     "${NEPTUNE_IAM_AUTH}" \
          --bucket       "${GRAPH_STAGING_BUCKET}" \
          --snapshot-key "${SNAPSHOT_KEY}"

  post_build:
    commands:
      - echo "Graph ingestion complete for ${REPO_URI}"

cache:
  paths:
    - '/root/.cache/pip/**/*'
